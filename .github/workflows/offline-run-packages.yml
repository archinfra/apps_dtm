name: offline-run-packages

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "构建架构：amd64、arm64 或 all"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - amd64
          - arm64
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

env:
  PACKAGE_DIR: "."

jobs:
  build:
    name: build-${{ matrix.arch }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip unmatched manual arch
        if: github.event_name == 'workflow_dispatch' && inputs.arch != 'all' && inputs.arch != matrix.arch
        run: |
          echo "skip matrix arch ${{ matrix.arch }} for requested arch ${{ inputs.arch }}"

      - name: Set up QEMU
        if: github.event_name != 'workflow_dispatch' || inputs.arch == 'all' || inputs.arch == matrix.arch
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: github.event_name != 'workflow_dispatch' || inputs.arch == 'all' || inputs.arch == matrix.arch
        uses: docker/setup-buildx-action@v3

      - name: Static check
        if: github.event_name != 'workflow_dispatch' || inputs.arch == 'all' || inputs.arch == matrix.arch
        shell: bash
        run: |
          bash -n build.sh install.sh
          python3 -m json.tool images/image.json >/dev/null
          ./install.sh -h >/tmp/install-help.txt
          grep -q "DTM Kubernetes 离线安装器" /tmp/install-help.txt

      - name: Build offline package
        if: github.event_name != 'workflow_dispatch' || inputs.arch == 'all' || inputs.arch == matrix.arch
        shell: bash
        run: |
          bash build.sh --arch "${{ matrix.arch }}"

      - name: Upload artifact
        if: github.event_name != 'workflow_dispatch' || inputs.arch == 'all' || inputs.arch == matrix.arch
        uses: actions/upload-artifact@v4
        with:
          name: dtm-k8s-${{ matrix.arch }}
          path: |
            dist/*.run
            dist/*.sha256
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
